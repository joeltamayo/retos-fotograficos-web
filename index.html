<!doctype html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PhotoChallenge</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhj6hW+ALEwIH" crossorigin="anonymous">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/components.css">
	<link rel="stylesheet" href="css/pages.css">
</head>
<body>
	<!-- El navbar se inserta dinámicamente desde JavaScript. -->
	<div id="navbar-container"></div>

	<!-- Contenedor principal donde el router del SPA pinta cada vista. -->
	<main id="app" role="main"></main>

	<!-- Aquí se montan los modales reutilizables de la aplicación. -->
	<div id="modal-container"></div>

	<!-- Contenedor fijo para notificaciones tipo toast. -->
	<div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index:1100"></div>

	<!-- Loader inicial visible mientras JavaScript arma la primera vista. -->
	<div id="initial-loader" class="d-flex justify-content-center align-items-center" style="height:100vh">
		<div class="spinner-border" style="color:var(--color-primary)"></div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
	<script type="module" src="js/app.js"></script>
</body>
</html>
