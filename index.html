<!doctype html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Retos fotográficos</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-grid.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<link rel="stylesheet" href="css/main.css">
</head>
<body>
	<!-- El navbar se inserta dinámicamente desde JavaScript. -->
	<div id="navbar-container"></div>

	<!-- Contenedor principal donde el router del SPA pinta cada vista. -->
	<main id="app" role="main"></main>

	<!-- Aquí se montan los modales reutilizables de la aplicación. -->
	<div id="modal-container"></div>

	<!-- Contenedor fijo para notificaciones tipo toast. -->
	<div id="toast-container" class="app-toast-container"></div>

	<!-- Loader inicial visible mientras JavaScript arma la primera vista. -->
	<div id="initial-loader" class="app-initial-loader">
		<div class="app-spinner"></div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
	<script type="module" src="js/app.js"></script>
</body>
</html>
